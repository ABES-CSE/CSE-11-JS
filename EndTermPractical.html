<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Marks Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #b5cfca;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            width: 350px;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 15px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Student Marks Calculator</h2>

    <input type="number" id="sub1" placeholder="Subject 1 Marks">
    <input type="number" id="sub2" placeholder="Subject 2 Marks">
    <input type="number" id="sub3" placeholder="Subject 3 Marks">
    <input type="number" id="sub4" placeholder="Subject 4 Marks">

    <button onclick="calculateResult()">Calculate</button>

    <div class="result" id="output"></div>
</div>

<script>
function calculateResult() {
    let s1 = Number(document.getElementById("sub1").value);
    let s2 = Number(document.getElementById("sub2").value);
    let s3 = Number(document.getElementById("sub3").value);
    let s4 = Number(document.getElementById("sub4").value);

    let total = s1 + s2 + s3 + s4;
    let percentage = total / 4;

    let grade;

    if (percentage >= 90)
        grade = "A+";
    else if (percentage >= 80)
        grade = "A";
    else if (percentage >= 70)
        grade = "B";
    else if (percentage >= 60)
        grade = "C";
    else if (percentage >= 50)
        grade = "D";
    else
        grade = "F";

    document.getElementById("output").innerHTML =
        "<p><b>Total Marks:</b> " + total + "/400</p>" +
        "<p><b>Percentage:</b> " + percentage.toFixed(2) + "%</p>" +
        "<p><b>Grade:</b> " + grade + "</p>";
}
</script>

</body>
</html>
