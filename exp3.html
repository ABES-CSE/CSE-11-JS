<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DOM Manipulation Experiment</title>
    <link rel="stylesheet" href="exp3.css">
</head>
<body>

    <h1 id="heading">Welcome to My Webpage</h1>

    <p id="para">
        This is a sample paragraph. You can show, hide, or modify me using buttons.
    </p>

    <input type="text" id="inputText" placeholder="Enter new heading text">

    <div class="buttons">
        <button id="btnHeading">Change Heading</button>
        <button id="btnColor">Change Background</button>
        <button id="btnFont">Increase Font Size</button>
        <button id="btnToggle">Show/Hide Paragraph</button>
    </div>

    <script src="exp3.js"></script>
</body>
</html>
